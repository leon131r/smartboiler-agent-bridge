; PlatformIO Project Configuration File
; WiFi Clock with OLED Display
; ESP32-C3 (lolin_c3_mini)

[env:lolin_c3_mini]
platform = espressif32
board = lolin_c3_mini
framework = arduino

; Скорость Serial монитора
monitor_speed = 115200
upload_speed = 460800

; Библиотеки
lib_deps =
    olikraus/U8g2@^2.35.5
    arduino-libraries/NTPClient@^3.2.1
    bblanchon/ArduinoJson@^6.21.5
    ESP32Async/ESPAsyncWebServer@^3.7.7

; Настройки сборки
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_ARDUHAL_LOG_COLORS=1

; Фильтры (игнорировать системные файлы)
build_src_filter = +<*> -<.git/> -<.svn/>
